org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Kotlin incremental uses paths relative to the Android module; on Windows, plugin sources under Pub-Cache (C:) and the project (D:) have different roots and the daemon crashes (KT-41381-style).
kotlin.incremental=false
